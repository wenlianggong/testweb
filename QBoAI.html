                cursor: pointer;

                display: flex;

                justify-content: center;

            .clear-memory-btn:hover {

            }
            
            .chat-input-area {
                display: flex;

                padding: 20px;
                background: rgba(255, 255, 255, 0.05);

        <script>
            const API_URL = 'https://api.deepseek.com/chat/completions';
            const DEFAULT_API_KEY = 'sk-e6d584345c6547559335921713d7a435';
            const STORAGE_KEY = 'qboai_chat_history';
            const MESSAGES_KEY = 'qboai_messages';
            
            const chatHistory = document.getElementById('chatHistory');
            const userInput = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const fileInput = document.getElementById('fileInput');
            const filePreviewArea = document.getElementById('filePreviewArea');
            const clearMemoryBtn = document.getElementById('clearMemoryBtn');
            
            let uploadedFiles = [];
            let messages = [];
            
            function initMessages() {
                const savedMessages = localStorage.getItem(MESSAGES_KEY);
                if (savedMessages) {
                    messages = JSON.parse(savedMessages);
                } else {
                    messages = [
                        {"role": "system", "content": "You are a helpful assistant named QBoAI. You can analyze images and files that users upload. Be helpful and friendly."}
                    ];
                }
            }
            
            function saveMessages() {
                localStorage.setItem(MESSAGES_KEY, JSON.stringify(messages));
            }
            
            function loadChatHistory() {
                const savedHistory = localStorage.getItem(STORAGE_KEY);
                if (savedHistory) {
                    chatHistory.innerHTML = savedHistory;
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }
            }
            
            function saveChatHistory() {
                localStorage.setItem(STORAGE_KEY, chatHistory.innerHTML);
            }
            
            function clearAllMemory() {
                if (confirm('确定要清除所有聊天记忆吗？')) {
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.removeItem(MESSAGES_KEY);
                    chatHistory.innerHTML = `
                        <div class="message ai-message">
                            <div class="message-avatar">Q</div>
                            <div class="message-content">
                                <p>你好！我是QBoAI，有什么我可以帮助你的吗？</p>
                            </div>
                        </div>
                    `;
                    initMessages();
                    addMessage('记忆已清除，让我们重新开始吧！', 'ai');
                }
            }
            
            async function readFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    
                    if (file.type.startsWith('image/')) {
                        reader.onload = () => {
                            resolve({
                                type: 'image',
                                name: file.name,
                                data: reader.result,
                                base64: reader.result.split(',')[1]
                            });
                        };
                        reader.readAsDataURL(file);
                    } else if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                        reader.onload = () => {
                            resolve({
                                type: 'text',
                                name: file.name,
                                content: reader.result
                            });
                        };
                        reader.readAsText(file);
                    } else {
                        resolve({
                            type: 'file',
                            name: file.name,
                            size: file.size,
                            mimeType: file.type
                        });
                    }
                    
                    reader.onerror = reject;
                });
            }
            
            function addFilePreview(fileData, index) {
                const previewItem = document.createElement('div');
                previewItem.className = 'file-preview-item';
                previewItem.dataset.index = index;
                
                if (fileData.type === 'image') {
                    previewItem.innerHTML = `
                        <img src="${fileData.data}" alt="${fileData.name}">
                        <div class="file-info">${fileData.name}</div>
                        <button class="remove-file" onclick="removeFile(${index})">×</button>
                    `;
                } else {
                    previewItem.innerHTML = `
                        <i class="fa fa-file" style="color: white; font-size: 2em;"></i>
                        <div class="file-info">${fileData.name}</div>
                        <button class="remove-file" onclick="removeFile(${index})">×</button>
                    `;
                }
                
                filePreviewArea.appendChild(previewItem);
            }
            
            function removeFile(index) {
                uploadedFiles = uploadedFiles.filter((_, i) => i !== index);
                renderFilePreviews();
            }
            
            function renderFilePreviews() {
                filePreviewArea.innerHTML = '';
                uploadedFiles.forEach((file, index) => {
                    addFilePreview(file, index);
                });
            }
            
            function markdownToHtml(markdown) {
                // 转换标题
                markdown = markdown.replace(/^###\s+(.*$)/gim, '<h3 class="markdown-h3">$1</h3>');
                markdown = markdown.replace(/^##\s+(.*$)/gim, '<h2 class="markdown-h2">$1</h2>');
                markdown = markdown.replace(/^#\s+(.*$)/gim, '<h1 class="markdown-h1">$1</h1>');
                
                // 转换粗体
                markdown = markdown.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
                
                // 转换列表
                markdown = markdown.replace(/^\s*\d+\.\s+(.*$)/gim, '<li class="markdown-list-item">$1</li>');
                markdown = markdown.replace(/(<li class="markdown-list-item">[\s\S]*?<\/li>)/gim, '<ul class="markdown-list">$1</ul>');
                
                // 转换无序列表
                markdown = markdown.replace(/^\s*-\s+(.*$)/gim, '<li class="markdown-list-item">$1</li>');
                
                // 转换分割线
                markdown = markdown.replace(/^---$/gim, '<hr class="markdown-hr">');
                
                // 转换段落
                markdown = markdown.replace(/^(?!<[h1-6ulli])([^\n]+)(?<!<\/[h1-6ulli])$/gim, '<p class="markdown-p">$1</p>');
                
                // 处理嵌套列表
                markdown = markdown.replace(/<\/ul>\s*<ul class="markdown-list">/gim, '');
                
                return markdown;
            }
            
            async function handleFileUpload(event) {
                const files = event.target.files;
                
                for (const file of files) {
                    try {
                        const fileData = await readFile(file);
                        uploadedFiles.push(fileData);
                    } catch (error) {
                        console.error('读取文件失败:', error);
                    }
                }
                
                renderFilePreviews();
                fileInput.value = '';
            }
            
            function buildMessageContent(text) {
                if (uploadedFiles.length === 0) {
                    return text;
                }
                
                let content = [];
                
                uploadedFiles.forEach(file => {
                    if (file.type === 'image') {
                        content.push({
                            type: 'image_url',
                            image_url: {
                                url: file.data
                            }
                        });
                    } else if (file.type === 'text') {
                        content.push({
                            type: 'text',
                            text: `[文件: ${file.name}]\n${file.content}`
                        });
                    } else {
                        content.push({
                            type: 'text',
                            text: `[附件: ${file.name} (${file.mimeType || '未知类型'}, ${(file.size / 1024).toFixed(2)}KB)]`
                        });
                    }
                });
                
                if (text) {
                    content.push({
                        type: 'text',
                        text: text
                    });
                }
                
                return content.length === 1 && content[0].type === 'text' ? content[0].text : content;
            }
            
            function addMessage(text, sender, files = []) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'message-avatar';
                avatarDiv.textContent = sender === 'user' ? 'U' : 'Q';
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                
                if (files.length > 0) {
                    files.forEach(file => {
                        if (file.type === 'image') {
                            const img = document.createElement('img');
                            img.src = file.data;
                            img.style.maxWidth = '200px';
                            img.style.borderRadius = '10px';
                            img.style.marginBottom = '10px';
                            contentDiv.appendChild(img);
                        } else {
                            const fileInfo = document.createElement('div');
                            fileInfo.className = 'uploaded-file';
                            fileInfo.innerHTML = `<i class="fa fa-file"></i> ${file.name}`;
                            contentDiv.appendChild(fileInfo);
                        }
                    });
                }
                
                if (sender === 'ai') {
                    const htmlContent = markdownToHtml(text);
                    contentDiv.innerHTML += htmlContent;
                } else {
                    const messageText = document.createElement('p');
                    messageText.textContent = text;
                    contentDiv.appendChild(messageText);
                }
                
                messageDiv.appendChild(avatarDiv);
                messageDiv.appendChild(contentDiv);
                
                chatHistory.appendChild(messageDiv);
                chatHistory.scrollTop = chatHistory.scrollHeight;
                
                saveChatHistory();
                
                return messageDiv;
            }
            
            async function sendMessage() {
                const message = userInput.value.trim();
                
                if (message === '' && uploadedFiles.length === 0) return;
                
                const currentFiles = [...uploadedFiles];
                
                addMessage(message || '(发送了文件)', 'user', currentFiles);
                
                const messageContent = buildMessageContent(message);
                
                if (Array.isArray(messageContent)) {
                    messages.push({
                        "role": "user",
                        "content": messageContent
                    });
                } else {
                    messages.push({
                        "role": "user",
                        "content": messageContent
                    });
                }
                
                saveMessages();
                
                userInput.value = '';
                uploadedFiles = [];
                renderFilePreviews();
                
                const loadingMessage = addMessage('正在思考...', 'ai');
                
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${DEFAULT_API_KEY}`
                        },
                        body: JSON.stringify({
                            "model": "deepseek-chat",
                            "messages": messages,
                            "stream": false
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`API请求失败: ${response.status}`);
                    }

                    const data = await response.json();
                    const aiResponse = data.choices[0].message.content;

                    loadingMessage.remove();
                    
                    addMessage(aiResponse, 'ai');
                    
                    messages.push({"role": "assistant", "content": aiResponse});
                    saveMessages();

                } catch (error) {
                    loadingMessage.remove();
                    addMessage('抱歉，发生了错误: ' + error.message, 'ai');
                    console.error('Error:', error);
                }
            }
            
            sendButton.addEventListener('click', sendMessage);
            
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            fileInput.addEventListener('change', handleFileUpload);
            
            clearMemoryBtn.addEventListener('click', clearAllMemory);
            
            initMessages();
            loadChatHistory();
        </script>
